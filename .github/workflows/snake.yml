name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write   # ✅ THIS FIXES YOUR ERROR

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: godwin-stanes
          outputs: |
            dist/github-contribution-grid-snake.svg

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}   # ✅ IMPORTANT
          target_branch: output
          build_dir: dist
